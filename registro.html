<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro — Plataforma de Cursos | Ingeniería de Sistemas</title>
  <meta name="description" content="Formulario de registro para la plataforma de cursos de la Facultad de Ingeniería de Sistemas.">
</head>

<body>

  <header>
    <h1>Registro de Nuevo Estudiante</h1>
    <p>Plataforma de Cursos — Facultad de Ingeniería de Sistemas</p>
  </header>

  <main>
    <form 
      action="/api/registro"
      method="POST"
      autocomplete="on"
      id="form-registro"
    >
      <!-- Aquí van los fieldsets en los siguientes pasos -->
       <fieldset>
  <legend>Datos Personales</legend>

  <div>
    <label for="nombre">Nombre completo *</label>
    <input
      type="text"
      id="nombre"
      name="nombre"
      placeholder="Ej: Ana García Martínez"
      required
      minlength="5"
      maxlength="100"
      autocomplete="name">
  </div>

  <div>
    <label for="email">Correo electrónico institucional *</label>
    <input
      type="email"
      id="email"
      name="email"
      placeholder="codigo@universidad.edu.co"
      required
      autocomplete="email"
      aria-describedby="email-ayuda">
    <p id="email-ayuda">Usar el correo institucional (termina en .edu.co).</p>
  </div>

  <div>
    <label for="telefono">Número de teléfono</label>
    <input
      type="tel"
      id="telefono"
      name="telefono"
      placeholder="+573001234567"
      pattern="(\+57)?[0-9]{10}"
      title="Número colombiano: +57 seguido de 10 dígitos"
      autocomplete="tel">
  </div>

  <div>
    <label for="nacimiento">Fecha de nacimiento *</label>
    <input
      type="date"
      id="nacimiento"
      name="fecha_nacimiento"
      required
      min="1985-01-01"
      max="2006-12-31"
      autocomplete="bday">
  </div>
</fieldset>

<fieldset>
  <legend>Datos de Cuenta</legend>

  <div>
    <label for="codigo">Código de estudiante *</label>
    <input
      type="text"
      id="codigo"
      name="codigo_estudiante"
      placeholder="Ej: 2024001"
      required
      pattern="[0-9]{7}"
      title="El código debe contener exactamente 7 dígitos numéricos"
      autocomplete="off">
  </div>

  <div>
    <label for="password">Contraseña *</label>
    <input
      type="password"
      id="password"
      name="contrasena"
      required
      minlength="8"
      pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9]).{8,}"
      title="Mínimo 8 caracteres con 1 mayúscula, 1 minúscula y 1 número"
      autocomplete="new-password"
      aria-describedby="pwd-req">
    <p id="pwd-req">Mínimo 8 caracteres. Debe incluir mayúsculas, minúsculas y números.</p>
  </div>

  <div>
    <label for="github">Perfil de GitHub</label>
    <input
      type="url"
      id="github"
      name="github_url"
      placeholder="https://github.com/mi-usuario"
      autocomplete="url">
  </div>
</fieldset>
    </form>
  </main>

  <footer>
    <p><small>&copy; 2026 Universidad — Ingeniería de Sistemas.</small></p>
  </footer>

</body>
</html>
